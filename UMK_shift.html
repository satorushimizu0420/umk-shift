<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="UMKシフト">
  <meta name="theme-color" content="#6366f1">
  <title>UMK シフト管理</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif; background:#f8fafc; }
    input::placeholder { color:#cbd5e1; }
    ::-webkit-scrollbar { height:4px; width:4px; background:#f1f5f9; }
    ::-webkit-scrollbar-thumb { background:#cbd5e1; border-radius:3px; }
    button:active { opacity:0.75; }
    .toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%); background:#1e293b; color:#fff; padding:10px 20px; border-radius:20px; font-size:13px; z-index:999; white-space:nowrap; box-shadow:0 4px 20px rgba(0,0,0,0.2); }
  </style>
</head>
<body>
<div id="root"></div>
<script>
// ══ GAS URL（設定後ここに貼り付け）══════════════════════
let GAS_URL = localStorage.getItem('umk_gas_url') || '';

const { useState, useMemo, useCallback, useEffect } = React;

const DEFAULT_SHIFT_TYPES = [
  { key:'－',      label:'－',      desc:'なし',      bg:'#f1f5f9', border:'#cbd5e1', text:'#64748b' },
  { key:'リンク',  label:'リンク',  desc:'リンク',    bg:'#dbeafe', border:'#3b82f6', text:'#1d4ed8' },
  { key:'4どき',  label:'4時どき', desc:'4時どき',   bg:'#fef9c3', border:'#f59e0b', text:'#92400e' },
  { key:'udoki',   label:'u-doki',  desc:'u-doki',    bg:'#dcfce7', border:'#22c55e', text:'#14532d' },
  { key:'kick',    label:'KO',      desc:'キックオフ', bg:'#fce7f3', border:'#ec4899', text:'#9d174d' },
  { key:'other',   label:'他',      desc:'その他',    bg:'#ede9fe', border:'#8b5cf6', text:'#6d28d9' },
];

const COLOR_PRESETS = [
  {bg:'#dbeafe',border:'#3b82f6',text:'#1d4ed8'},{bg:'#dcfce7',border:'#22c55e',text:'#15803d'},
  {bg:'#fef9c3',border:'#eab308',text:'#854d0e'},{bg:'#ede9fe',border:'#8b5cf6',text:'#6d28d9'},
  {bg:'#cffafe',border:'#06b6d4',text:'#0e7490'},{bg:'#fce7f3',border:'#ec4899',text:'#9d174d'},
  {bg:'#fee2e2',border:'#ef4444',text:'#991b1b'},{bg:'#d1fae5',border:'#10b981',text:'#065f46'},
  {bg:'#ffedd5',border:'#f97316',text:'#9a3412'},{bg:'#f3e8ff',border:'#a855f7',text:'#7e22ce'},
];

const EMPTY_SHIFT = {key:'',label:'－',desc:'未設定',bg:'#f1f5f9',border:'#cbd5e1',text:'#94a3b8'};

const getDays = (y,m) => new Date(y,m+1,0).getDate();
const getDow  = (y,m,d) => new Date(y,m,d).getDay();
const DOW_JP  = ['日','月','火','水','木','金','土'];
const isSat   = (y,m,d) => getDow(y,m,d)===6;
const isSun   = (y,m,d) => getDow(y,m,d)===0;
function dowColor(y,m,d){ if(isSun(y,m,d))return'#ef4444'; if(isSat(y,m,d))return'#3b82f6'; return'#64748b'; }

const LOCAL_KEY = 'umk_shift_v2';
function loadLocal(){ try{ const r=localStorage.getItem(LOCAL_KEY); return r?JSON.parse(r):null; }catch(e){return null;} }
function saveLocal(s){ try{ localStorage.setItem(LOCAL_KEY,JSON.stringify(s)); }catch(e){} }

function makeDefault(){ return [{ id:'store-0', name:'UMK', staff:[
  {id:'s-0', name:'桑畑'},
  {id:'s-1', name:'清水'},
]}]; }

// ── GAS通信 ──────────────────────────────────────────────
async function gasLoad() {
  if(!GAS_URL) return null;
  try {
    const r = await fetch(GAS_URL+'?action=load');
    const j = await r.json();
    return j.data ? JSON.parse(j.data) : null;
  } catch(e){ return null; }
}
async function gasSave(state) {
  if(!GAS_URL) return;
  try {
    await fetch(GAS_URL+'?action=save&data='+encodeURIComponent(JSON.stringify(state)));
  } catch(e){}
}
async function gasSendMail() {
  if(!GAS_URL) return false;
  try {
    const r = await fetch(GAS_URL+'?action=mail');
    const j = await r.json();
    return j.success || false;
  } catch(e){ return false; }
}

// ══ App ═════════════════════════════════════════════════
function App() {
  const now = new Date();
  const saved = loadLocal();

  const [year,       setYear]       = useState(saved?.year       ?? now.getFullYear());
  const [month,      setMonth]      = useState(saved?.month      ?? now.getMonth());
  const [stores,     setStores]     = useState(saved?.stores     ?? makeDefault());
  const [shiftTypes, setShiftTypes] = useState(saved?.shiftTypes ?? DEFAULT_SHIFT_TYPES);
  const [shifts,     setShifts]     = useState(saved?.shifts     ?? {'store-0':{}});
  const [activeStoreId, setActiveStoreId] = useState(saved?.activeStoreId ?? 'store-0');
  const [panel,      setPanel]      = useState('shift');
  const [editCell,   setEditCell]   = useState(null);
  const [newStaffName, setNewStaffName] = useState('');
  const [newStoreName, setNewStoreName] = useState('');
  const [gasUrl,     setGasUrl]     = useState(GAS_URL);
  const [toast,      setToast]      = useState('');
  const [syncing,    setSyncing]    = useState(false);
  const [gasInput,   setGasInput]   = useState(GAS_URL);
  const [unsaved,    setUnsaved]    = useState(false);

  // ── Toast ──
  const showToast = (msg) => { setToast(msg); setTimeout(()=>setToast(''),3000); };

  // ── 起動時クラウドから読み込み ──
  useEffect(()=>{
    if(!GAS_URL) return;
    setSyncing(true);
    gasLoad().then(data=>{
      if(data){
        if(data.stores)     setStores(data.stores);
        if(data.shiftTypes) setShiftTypes(data.shiftTypes);
        if(data.shifts)     setShifts(data.shifts);
        if(data.activeStoreId) setActiveStoreId(data.activeStoreId);
        showToast('☁️ クラウドから読み込みました');
      }
      setSyncing(false);
    });
  },[]);

  const days = getDays(year,month);
  const activeStore  = stores.find(s=>s.id===activeStoreId)||stores[0];
  const storeShifts  = shifts[activeStore?.id]||{};

  // ── 保存（ローカル自動保存・クラウドは手動）──
  const persist = useCallback((patch)=>{
    const next = {year,month,stores,shiftTypes,shifts,activeStoreId,...patch};
    saveLocal(next);
    setUnsaved(true);
  },[year,month,stores,shiftTypes,shifts,activeStoreId]);

  // ── 手動クラウド保存 ──
  const manualSave = async () => {
    setSyncing(true);
    const next = {year,month,stores,shiftTypes,shifts,activeStoreId};
    saveLocal(next);
    await gasSave(next);
    setUnsaved(false);
    showToast('✅ 保存しました');
    setSyncing(false);
  };

  // ── 手動同期 ──
  const syncNow = async () => {
    setSyncing(true);
    const data = await gasLoad();
    if(data){
      if(data.stores)     setStores(data.stores);
      if(data.shiftTypes) setShiftTypes(data.shiftTypes);
      if(data.shifts)     setShifts(data.shifts);
      showToast('☁️ 同期しました');
    } else {
      showToast('⚠ 同期失敗。URLを確認してください');
    }
    setSyncing(false);
  };

  // ── 月次メール手動送信 ──
  const sendMail = async () => {
    setSyncing(true);
    const ok = await gasSendMail();
    showToast(ok ? '📧 集計メールを送信しました！' : '⚠ 送信失敗。GAS URLを確認してください');
    setSyncing(false);
  };

  const changeMonth = (d)=>{ let m=month+d,y=year; if(m>11){m=0;y++;} if(m<0){m=11;y--;} setMonth(m);setYear(y); persist({month:m,year:y}); };

  const setCell=(staffId,day,code)=>{
    const ss={...(shifts[activeStore.id]||{})};
    const arr=[...(ss[staffId]||Array(days).fill(''))];
    arr[day-1]=code; ss[staffId]=arr;
    const ns={...shifts,[activeStore.id]:ss};
    setShifts(ns); setEditCell(null); persist({shifts:ns});
  };

  const addStaff=()=>{
    const name=newStaffName.trim();
    if(!name||!activeStore||activeStore.staff.length>=7) return;
    if(activeStore.staff.find(p=>p.name===name)) return;
    const person={id:'p-'+Date.now(),name};
    const ns=stores.map(s=>s.id===activeStore.id?{...s,staff:[...s.staff,person]}:s);
    const ss={...(shifts[activeStore.id]||{})}; ss[person.id]=Array(days).fill('');
    const nsh={...shifts,[activeStore.id]:ss};
    setStores(ns);setShifts(nsh);setNewStaffName(''); persist({stores:ns,shifts:nsh});
  };
  const removeStaff=(storeId,staffId)=>{
    const ns=stores.map(s=>s.id===storeId?{...s,staff:s.staff.filter(x=>x.id!==staffId)}:s);
    const ss={...(shifts[storeId]||{})}; delete ss[staffId];
    const nsh={...shifts,[storeId]:ss};
    setStores(ns);setShifts(nsh); persist({stores:ns,shifts:nsh});
  };
  const renameStaff=(storeId,staffId,name)=>{
    const ns=stores.map(s=>s.id===storeId?{...s,staff:s.staff.map(p=>p.id===staffId?{...p,name}:p)}:s);
    setStores(ns); persist({stores:ns});
  };
  const addStore=()=>{
    const name=newStoreName.trim();
    if(!name||stores.length>=8||stores.find(s=>s.name===name)) return;
    const store={id:'store-'+Date.now(),name,staff:[]};
    const ns=[...stores,store]; const nsh={...shifts,[store.id]:{}};
    setStores(ns);setShifts(nsh);setActiveStoreId(store.id);setNewStoreName('');
    persist({stores:ns,shifts:nsh,activeStoreId:store.id});
  };
  const removeStore=(id)=>{
    if(stores.length<=1) return;
    const ns=stores.filter(s=>s.id!==id); const ni=activeStoreId===id?ns[0].id:activeStoreId;
    const nsh={...shifts}; delete nsh[id];
    setStores(ns);setActiveStoreId(ni);setShifts(nsh); persist({stores:ns,activeStoreId:ni,shifts:nsh});
  };
  const renameStore=(id,name)=>{ const ns=stores.map(s=>s.id===id?{...s,name}:s); setStores(ns); persist({stores:ns}); };

  const updateShiftType=(idx,patch)=>{ const n=shiftTypes.map((t,i)=>i===idx?{...t,...patch}:t); setShiftTypes(n); persist({shiftTypes:n}); };
  const addShiftType=()=>{ const p=COLOR_PRESETS[shiftTypes.length%COLOR_PRESETS.length]; const n=[...shiftTypes,{key:'S'+(shiftTypes.length+1),label:'新'+(shiftTypes.length+1),desc:'新種別',...p}]; setShiftTypes(n); persist({shiftTypes:n}); };
  const removeShiftType=(idx)=>{ const n=shiftTypes.filter((_,i)=>i!==idx); setShiftTypes(n); persist({shiftTypes:n}); };

  const getType=(code)=>shiftTypes.find(t=>t.key===code)||EMPTY_SHIFT;

  const staffStats=useMemo(()=>{
    if(!activeStore) return [];
    const rk=['OFF','有休','特休','欠勤','公休','閉',''];
    return activeStore.staff.map(p=>{ const arr=storeShifts[p.id]||[]; return{...p,
      work:arr.filter(x=>x&&!rk.includes(x)).length,
      off:arr.filter(x=>['OFF','有休','特休','公休'].includes(x)).length,
      absent:arr.filter(x=>x==='欠勤').length,
    };});
  },[storeShifts,activeStore,shiftTypes]);

  const dayWorkCount=useMemo(()=>{
    if(!activeStore) return [];
    const rk=['OFF','有休','特休','公休','閉','欠勤',''];
    return Array.from({length:days},(_,i)=>activeStore.staff.filter(p=>{const c=(storeShifts[p.id]||[])[i];return c&&!rk.includes(c);}).length);
  },[storeShifts,activeStore,days]);

  if(!activeStore) return null;
  const allOptions=[...shiftTypes,EMPTY_SHIFT];

  const S={
    navBtn:{background:'none',border:'none',color:'#94a3b8',fontSize:'20px',cursor:'pointer',padding:'0 6px',lineHeight:1},
    hBtn:{padding:'8px 12px',borderRadius:'9px',border:'none',color:'#fff',fontSize:'12px',fontWeight:'700',cursor:'pointer',whiteSpace:'nowrap'},
    th:{padding:'6px 3px',borderBottom:'2px solid #e2e8f0',borderRight:'1px solid #f1f5f9',color:'#94a3b8',fontWeight:'600',fontSize:'11px',textAlign:'center',position:'sticky',top:0,zIndex:3,background:'#f8fafc'},
    card:{background:'#fff',border:'1.5px solid #e2e8f0',borderRadius:'12px',padding:'16px',boxShadow:'0 2px 8px rgba(0,0,0,0.04)'},
    delBtn:{background:'#fef2f2',border:'1px solid #fecaca',color:'#ef4444',cursor:'pointer',fontSize:'11px',padding:'4px 9px',borderRadius:'5px',fontWeight:'700'},
    inputSt:{flex:1,background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'8px',padding:'8px 12px',color:'#1e293b',fontSize:'13px',outline:'none'},
    addBtn:{padding:'8px 12px',background:'linear-gradient(135deg,#6366f1,#4f46e5)',color:'#fff',border:'none',borderRadius:'8px',cursor:'pointer',fontSize:'12px',fontWeight:'700',whiteSpace:'nowrap'},
    sInput:{background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'7px',padding:'6px 10px',color:'#1e293b',fontSize:'12px',outline:'none'},
    mLabel:{fontSize:'10px',color:'#94a3b8',letterSpacing:'0.5px',display:'block',marginBottom:'3px'},
  };

  const e = React.createElement;

  return e('div',{style:{minHeight:'100vh',background:'#f8fafc',color:'#1e293b',fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",paddingBottom:'env(safe-area-inset-bottom)'}},

    // Toast
    toast && e('div',{className:'toast'},toast),

    // Header
    e('div',{style:{background:'#fff',borderBottom:'2px solid #e2e8f0',padding:'12px 16px',display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap',boxShadow:'0 2px 12px rgba(0,0,0,0.06)',position:'sticky',top:0,zIndex:10}},
      e('div',{style:{marginRight:'auto'}},
        e('div',{style:{fontSize:'9px',letterSpacing:'4px',color:'#94a3b8',marginBottom:'1px'}},'SHIFT MANAGEMENT'),
        e('div',{style:{fontSize:'18px',fontWeight:'800',background:'linear-gradient(135deg,#6366f1,#0ea5e9)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'UMK シフト管理')
      ),
      e('div',{style:{display:'flex',alignItems:'center',gap:'5px',background:'#f1f5f9',borderRadius:'10px',padding:'5px 10px',border:'1px solid #e2e8f0'}},
        e('button',{onClick:()=>changeMonth(-1),style:S.navBtn},'‹'),
        e('span',{style:{fontSize:'13px',fontWeight:'700',minWidth:'80px',textAlign:'center',color:'#1e293b'}},year+'年'+(month+1)+'月'),
        e('button',{onClick:()=>changeMonth(1),style:S.navBtn},'›')
      ),
      // 未保存インジケーター＋手動保存ボタン
      e('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
        unsaved && e('span',{style:{fontSize:'10px',color:'#f59e0b',fontWeight:'700',background:'#fffbeb',padding:'3px 8px',borderRadius:'20px',border:'1px solid #fde68a',whiteSpace:'nowrap'}},'● 未保存'),
        e('button',{
          onClick:manualSave,
          disabled:syncing,
          style:{...S.hBtn,
            background:unsaved?'linear-gradient(135deg,#6366f1,#4f46e5)':'#f1f5f9',
            color:unsaved?'#fff':'#94a3b8',
            border:unsaved?'none':'1.5px solid #e2e8f0',
            boxShadow:unsaved?'0 4px 14px rgba(99,102,241,0.3)':'none',
          }
        }, syncing?'⏳ 保存中...':'💾 保存')
      ),
      // クラウド同期ボタン
      GAS_URL && e('button',{onClick:syncNow,style:{...S.hBtn,background:syncing?'#94a3b8':'linear-gradient(135deg,#0ea5e9,#0284c7)'},disabled:syncing}, syncing?'⏳':'☁️'),
      e('button',{onClick:()=>setPanel(panel==='shiftTypes'?'shift':'shiftTypes'),style:{...S.hBtn,background:panel==='shiftTypes'?'#6366f1':'#fff',color:panel==='shiftTypes'?'#fff':'#64748b',border:'1.5px solid #e2e8f0'}},'🎨'),
      e('button',{onClick:()=>setPanel(panel==='settings'?'shift':'settings'),style:{...S.hBtn,background:panel==='settings'?'#6366f1':'#fff',color:panel==='settings'?'#fff':'#64748b',border:'1.5px solid #e2e8f0'}},'⚙')
    ),

    // Store tabs
    e('div',{style:{background:'#fff',borderBottom:'1.5px solid #e2e8f0',padding:'0 16px',display:'flex',gap:'2px',overflowX:'auto'}},
      stores.map(store=>e('button',{key:store.id,onClick:()=>{setActiveStoreId(store.id);setPanel('shift');persist({activeStoreId:store.id});},style:{padding:'9px 16px',background:'none',border:'none',borderBottom:activeStoreId===store.id?'3px solid #6366f1':'3px solid transparent',color:activeStoreId===store.id?'#6366f1':'#94a3b8',fontSize:'13px',fontWeight:activeStoreId===store.id?'700':'400',cursor:'pointer',whiteSpace:'nowrap'}},store.name))
    ),

    // ── ShiftTypes Panel ──
    panel==='shiftTypes' && e('div',{style:{padding:'20px 16px',maxWidth:'780px'}},
      e('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'16px'}},
        e('div',null,e('div',{style:{fontSize:'15px',fontWeight:'800'}},'🎨 シフト種別の編集'),e('div',{style:{fontSize:'11px',color:'#94a3b8',marginTop:'2px'}},'ラベル・説明・色を自由にカスタマイズ')),
        e('button',{onClick:addShiftType,style:{...S.hBtn,background:'linear-gradient(135deg,#10b981,#059669)'}},'＋ 追加')
      ),
      e('div',{style:{display:'grid',gap:'10px'}},
        shiftTypes.map((t,idx)=>e('div',{key:idx,style:{background:'#fff',borderLeft:'4px solid '+t.border,border:'1.5px solid '+t.border+'30',borderRadius:'12px',padding:'12px 14px',display:'flex',alignItems:'center',gap:'12px',boxShadow:'0 2px 8px rgba(0,0,0,0.04)',flexWrap:'wrap'}},
          e('div',{style:{background:t.bg,border:'1.5px solid '+t.border,color:t.text,borderRadius:'7px',padding:'5px 10px',fontSize:'12px',fontWeight:'800',minWidth:'52px',textAlign:'center',flexShrink:0}},t.label),
          e('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',flex:1}},
            e('div',null,e('label',{style:S.mLabel},'キー'),e('input',{value:t.key,onChange:ev=>updateShiftType(idx,{key:ev.target.value}),style:{...S.sInput,width:'66px',fontWeight:'700'},maxLength:6})),
            e('div',null,e('label',{style:S.mLabel},'ラベル'),e('input',{value:t.label,onChange:ev=>updateShiftType(idx,{label:ev.target.value}),style:{...S.sInput,width:'78px'},maxLength:6})),
            e('div',null,e('label',{style:S.mLabel},'説明'),e('input',{value:t.desc,onChange:ev=>updateShiftType(idx,{desc:ev.target.value}),style:{...S.sInput,width:'100px'},maxLength:10}))
          ),
          e('div',null,e('label',{style:S.mLabel},'カラー'),e('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap',maxWidth:'160px'}},COLOR_PRESETS.map((p,pi)=>e('button',{key:pi,onClick:()=>updateShiftType(idx,p),style:{width:'18px',height:'18px',borderRadius:'50%',background:p.bg,border:'2px solid '+p.border,cursor:'pointer',flexShrink:0}})))),
          e('div',null,e('label',{style:S.mLabel},'背景/枠/文字'),e('div',{style:{display:'flex',gap:'4px'}},[['bg','背景'],['border','枠'],['text','文字']].map(([k,lbl])=>e('div',{key:k,style:{display:'flex',flexDirection:'column',alignItems:'center',gap:'2px'}},e('div',{style:{position:'relative',width:'24px',height:'24px',borderRadius:'5px',border:'1.5px solid #e2e8f0',overflow:'hidden'}},e('div',{style:{position:'absolute',inset:0,background:t[k]}}),e('input',{type:'color',value:t[k],onChange:ev=>updateShiftType(idx,{[k]:ev.target.value}),style:{opacity:0,position:'absolute',inset:0,width:'100%',height:'100%',cursor:'pointer'}})),e('span',{style:{fontSize:'9px',color:'#94a3b8'}},lbl))))),
          e('button',{onClick:()=>removeShiftType(idx),style:{...S.delBtn,marginLeft:'auto'}},'削除')
        ))
      )
    ),

    // ── Settings Panel ──
    panel==='settings' && e('div',{style:{padding:'20px 16px',maxWidth:'700px'}},
      e('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'14px'}},
        // Stores
        e('div',{style:S.card},
          e('div',{style:{fontSize:'13px',fontWeight:'700',color:'#6366f1',marginBottom:'12px'}},'🏪 店舗'),
          stores.map(store=>e('div',{key:store.id,style:{display:'flex',alignItems:'center',gap:'6px',padding:'7px 0',borderBottom:'1px solid #f1f5f9'}},
            e('input',{defaultValue:store.name,onBlur:ev=>renameStore(store.id,ev.target.value.trim()||store.name),style:{flex:1,background:'transparent',border:'1px solid transparent',borderRadius:'6px',padding:'3px 6px',color:'#1e293b',fontSize:'13px',outline:'none'}}),
            e('button',{onClick:()=>removeStore(store.id),style:S.delBtn},'✕')
          )),
          stores.length<8&&e('div',{style:{display:'flex',gap:'6px',marginTop:'10px'}},
            e('input',{value:newStoreName,onChange:ev=>setNewStoreName(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&addStore(),placeholder:'店舗名',style:S.inputSt}),
            e('button',{onClick:addStore,style:S.addBtn},'追加')
          )
        ),
        // Staff（名前編集可能）
        e('div',{style:S.card},
          e('div',{style:{fontSize:'13px',fontWeight:'700',color:'#6366f1',marginBottom:'12px'}},'👤 '+activeStore.name+' スタッフ'),
          activeStore.staff.map(p=>e('div',{key:p.id,style:{display:'flex',alignItems:'center',gap:'6px',padding:'7px 0',borderBottom:'1px solid #f1f5f9'}},
            e('input',{defaultValue:p.name,onBlur:ev=>renameStaff(activeStore.id,p.id,ev.target.value.trim()||p.name),style:{flex:1,background:'#f8fafc',border:'1.5px solid #e2e8f0',borderRadius:'6px',padding:'5px 8px',color:'#1e293b',fontSize:'13px',outline:'none',fontWeight:'600'}}),
            e('button',{onClick:()=>removeStaff(activeStore.id,p.id),style:S.delBtn},'✕')
          )),
          activeStore.staff.length<7&&e('div',{style:{display:'flex',gap:'6px',marginTop:'10px'}},
            e('input',{value:newStaffName,onChange:ev=>setNewStaffName(ev.target.value),onKeyDown:ev=>ev.key==='Enter'&&addStaff(),placeholder:'スタッフ名を入力',style:S.inputSt}),
            e('button',{onClick:addStaff,style:S.addBtn},'追加')
          ),
          e('div',{style:{marginTop:'10px',padding:'8px 10px',background:'#f8fafc',borderRadius:'8px',fontSize:'11px',color:'#94a3b8'}},'※ 名前をタップして編集できます')
        )
      ),

      // GAS URL設定
      e('div',{style:{...S.card,marginTop:'14px'}},
        e('div',{style:{fontSize:'13px',fontWeight:'700',color:'#6366f1',marginBottom:'10px'}},'☁️ クラウド同期設定'),
        e('div',{style:{fontSize:'12px',color:'#64748b',marginBottom:'8px'}},'Google Apps Script の Web App URL を貼り付けてください'),
        e('div',{style:{display:'flex',gap:'6px'}},
          e('input',{value:gasInput,onChange:ev=>setGasInput(ev.target.value),placeholder:'https://script.google.com/macros/s/...',style:{...S.inputSt,fontSize:'11px'}}),
          e('button',{onClick:()=>{GAS_URL=gasInput;localStorage.setItem('umk_gas_url',gasInput);setGasUrl(gasInput);showToast('✅ URLを保存しました');},style:S.addBtn},'保存')
        ),
        gasUrl && e('div',{style:{marginTop:'8px',fontSize:'11px',color:'#10b981'}},'✅ URL設定済み'),
        // メール手動送信ボタン
        e('div',{style:{marginTop:'12px',paddingTop:'12px',borderTop:'1px solid #f1f5f9'}},
          e('div',{style:{fontSize:'12px',color:'#64748b',marginBottom:'8px'}},'月末19時に自動送信されます。手動で今すぐ送信することもできます。'),
          e('button',{onClick:sendMail,style:{...S.hBtn,background:'linear-gradient(135deg,#6366f1,#4f46e5)',width:'100%',padding:'12px'}},'📧 集計メールを今すぐ送信')
        )
      )
    ),

    // ── Shift Grid ──
    panel==='shift' && e('div',{style:{padding:'12px 16px'}},
      activeStore.staff.length===0&&e('div',{style:{color:'#94a3b8',fontSize:'13px',padding:'8px 0 12px'}},'⚙ 設定からスタッフを追加してください'),
      e('div',{style:{overflowX:'auto',borderRadius:'10px',border:'1.5px solid #e2e8f0',boxShadow:'0 4px 16px rgba(0,0,0,0.06)'}},
        e('table',{style:{borderCollapse:'collapse',minWidth:'100%',tableLayout:'fixed'}},
          e('colgroup',null,e('col',{style:{width:'68px'}}),...Array.from({length:days},(_,i)=>e('col',{key:i,style:{width:'38px'}}))),
          e('thead',null,e('tr',null,
            e('th',{style:{...S.th,textAlign:'left',paddingLeft:'10px'}},e('span',{style:{fontSize:'10px',color:'#94a3b8'}},activeStore.name)),
            ...Array.from({length:days},(_,i)=>{
              const d=i+1, dow=getDow(year,month,d);
              const isMon=dow===1;
              const bgC=isSun(year,month,d)?'#fff1f2':isMon?'#f5f3ff':isSat(year,month,d)?'#eff6ff':'#f8fafc';
              const numColor=isSun(year,month,d)?'#ef4444':isSat(year,month,d)?'#3b82f6':isMon?'#8b5cf6':'#1e293b';
              return e('th',{key:d,style:{...S.th,background:bgC}},
                e('div',{style:{fontSize:'11px',fontWeight:'700',color:numColor}},d),
                e('div',{style:{fontSize:'9px',color:dowColor(year,month,d)}},DOW_JP[dow]),
                e('div',{style:{fontSize:'9px',color:dayWorkCount[i]===0?'#e2e8f0':'#94a3b8'}},dayWorkCount[i]+'人')
              );
            })
          )),
          e('tbody',null,activeStore.staff.map((person,pi)=>{
            const arr=storeShifts[person.id]||Array(days).fill('');
            return e('tr',{key:person.id,style:{background:pi%2===0?'#fff':'#fafbfc'}},
              e('td',{style:{padding:'5px 8px',borderBottom:'1px solid #f1f5f9',borderRight:'2px solid #e2e8f0',fontSize:'12px',fontWeight:'700',color:'#6366f1',whiteSpace:'nowrap',position:'sticky',left:0,background:pi%2===0?'#fff':'#fafbfc',zIndex:1}},person.name),
              ...Array.from({length:days},(_,i)=>{
                const d=i+1, dow=getDow(year,month,d), code=arr[i]||'', t=getType(code);
                const isMon=dow===1;
                const isEd=editCell?.staffId===person.id&&editCell?.day===d;
                const colBg=isSun(year,month,d)?'rgba(254,241,242,0.7)':isMon?'rgba(245,243,255,0.7)':isSat(year,month,d)?'rgba(239,246,255,0.7)':'transparent';
                return e('td',{key:d,onClick:()=>setEditCell({staffId:person.id,day:d}),style:{padding:'3px',borderBottom:'1px solid #f1f5f9',borderRight:'1px solid #f1f5f9',textAlign:'center',cursor:'pointer',background:isEd?'#eff6ff':colBg,outline:isEd?'2px solid #6366f1':'none',outlineOffset:'-2px'}},
                  code?e('div',{style:{background:t.bg,border:'1px solid '+t.border,color:t.text,borderRadius:'4px',padding:'3px 1px',fontSize:'9px',fontWeight:'800',lineHeight:1.2}},t.label):e('div',{style:{color:'#d1d5db',fontSize:'10px'}},'·')
                );
              })
            );
          }))
        )
      ),
      e('div',{style:{display:'flex',gap:'7px',flexWrap:'wrap',marginTop:'10px',alignItems:'center'}},
        e('span',{style:{fontSize:'10px',color:'#94a3b8'}},'凡例：'),
        shiftTypes.map(t=>e('div',{key:t.key,style:{display:'flex',alignItems:'center',gap:'4px',fontSize:'10px',color:'#64748b'}},
          e('div',{style:{background:t.bg,border:'1px solid '+t.border,color:t.text,borderRadius:'4px',padding:'2px 6px',fontSize:'9px',fontWeight:'800'}},t.label),t.desc
        ))
      )
    ),

    // Edit Modal
    editCell && e('div',{style:{position:'fixed',inset:0,background:'rgba(15,23,42,0.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200},onClick:()=>setEditCell(null)},
      e('div',{onClick:ev=>ev.stopPropagation(),style:{background:'#fff',borderRadius:'20px',padding:'22px 20px',minWidth:'290px',maxWidth:'380px',width:'92vw',boxShadow:'0 30px 80px rgba(0,0,0,0.2)'}},
        e('div',{style:{marginBottom:'14px'}},
          e('div',{style:{fontSize:'10px',letterSpacing:'2px',color:'#6366f1',marginBottom:'3px'}},'シフト変更'),
          e('div',{style:{fontSize:'15px',fontWeight:'800',color:'#1e293b'}},
            activeStore.staff.find(p=>p.id===editCell.staffId)?.name,
            e('span',{style:{color:'#94a3b8',fontWeight:'400',fontSize:'12px'}},' — '+(month+1)+'月'+editCell.day+'日（'+DOW_JP[getDow(year,month,editCell.day)]+'）')
          ),
          (()=>{ const code=(storeShifts[editCell.staffId]||[])[editCell.day-1]||''; const t=getType(code); return code?e('div',{style:{marginTop:'6px',display:'flex',alignItems:'center',gap:'5px',fontSize:'11px',color:'#64748b'}},'現在：',e('span',{style:{background:t.bg,border:'1px solid '+t.border,color:t.text,borderRadius:'4px',padding:'2px 7px',fontSize:'10px',fontWeight:'800'}},t.label)):null; })()
        ),
        e('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'8px'}},
          allOptions.map(t=>{
            const current=(storeShifts[editCell.staffId]||[])[editCell.day-1]||'';
            const isAct=current===t.key;
            return e('button',{key:t.key||'empty',onClick:()=>setCell(editCell.staffId,editCell.day,t.key),style:{padding:'12px 4px',background:isAct?t.border:t.bg,border:'1.5px solid '+(isAct?'transparent':t.border),borderRadius:'10px',color:isAct?'#fff':t.text,fontSize:'12px',fontWeight:'800',cursor:'pointer',boxShadow:isAct?'0 4px 12px '+t.border+'60':'none',outline:isAct?'2px solid '+t.border:'none',outlineOffset:'2px'}},
              e('div',null,t.label||'－'),e('div',{style:{fontSize:'9px',opacity:0.7,marginTop:'2px'}},t.desc)
            );
          })
        ),
        e('button',{onClick:()=>setEditCell(null),style:{marginTop:'12px',width:'100%',padding:'10px',background:'#f8fafc',color:'#94a3b8',border:'1.5px solid #e2e8f0',borderRadius:'8px',cursor:'pointer',fontSize:'13px',fontWeight:'600'}},'キャンセル')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
