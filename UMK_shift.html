<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="UMKシフト">
  <meta name="theme-color" content="#6366f1">
  <title>UMK シフト管理</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif; background: #f8fafc; }
    input::placeholder { color: #cbd5e1; }
    ::-webkit-scrollbar { height: 4px; width: 4px; background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    button:active { opacity: 0.75; }
  </style>
</head>
<body>
<div id="root"></div>
<script>
const { useState, useMemo, useCallback } = React;

// ── Data ──────────────────────────────────────────────────────────────────────
const STORAGE_KEY = 'umk_shift_v1';

const DEFAULT_SHIFT_TYPES = [
  { key: '－',    label: '－',      desc: 'なし',    bg: '#f1f5f9', border: '#cbd5e1', text: '#64748b' },
  { key: 'リンク', label: 'リンク', desc: 'リンク',  bg: '#dbeafe', border: '#3b82f6', text: '#1d4ed8' },
  { key: '4どき', label: '4時どき', desc: '4時どき', bg: '#fef9c3', border: '#f59e0b', text: '#92400e' },
  { key: 'udoki', label: 'u-doki',  desc: 'u-doki',  bg: '#dcfce7', border: '#22c55e', text: '#14532d' },
];

const COLOR_PRESETS = [
  { bg:'#dbeafe', border:'#3b82f6', text:'#1d4ed8' },
  { bg:'#dcfce7', border:'#22c55e', text:'#15803d' },
  { bg:'#fef9c3', border:'#eab308', text:'#854d0e' },
  { bg:'#ede9fe', border:'#8b5cf6', text:'#6d28d9' },
  { bg:'#cffafe', border:'#06b6d4', text:'#0e7490' },
  { bg:'#fce7f3', border:'#ec4899', text:'#9d174d' },
  { bg:'#fee2e2', border:'#ef4444', text:'#991b1b' },
  { bg:'#d1fae5', border:'#10b981', text:'#065f46' },
  { bg:'#ffedd5', border:'#f97316', text:'#9a3412' },
  { bg:'#f3e8ff', border:'#a855f7', text:'#7e22ce' },
];

const EMPTY_SHIFT = { key: '', label: '－', desc: '未設定', bg: '#f1f5f9', border: '#cbd5e1', text: '#94a3b8' };

// ── Date helpers ──────────────────────────────────────────────────────────────
const getDays = (y, m) => new Date(y, m + 1, 0).getDate();
const getDow  = (y, m, d) => new Date(y, m, d).getDay();
const DOW_JP  = ['日','月','火','水','木','金','土'];
const isSat   = (y, m, d) => getDow(y, m, d) === 6;
const isSun   = (y, m, d) => getDow(y, m, d) === 0;

function dowColor(y, m, d) {
  if (isSun(y, m, d)) return '#ef4444';
  if (isSat(y, m, d)) return '#3b82f6';
  return '#64748b';
}

// ── Storage ───────────────────────────────────────────────────────────────────
function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return null;
}
function saveState(state) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

// ── Default ───────────────────────────────────────────────────────────────────
function makeDefaultStores() {
  return [{ id: 'store-0', name: 'UMK', staff: [] }];
}

// ═════════════════════════════════════════════════════════════════════════════
function App() {
  const now = new Date();
  const saved = loadState();

  const [year,       setYear]       = useState(saved?.year       ?? now.getFullYear());
  const [month,      setMonth]      = useState(saved?.month      ?? now.getMonth());
  const [stores,     setStores]     = useState(saved?.stores     ?? makeDefaultStores());
  const [shiftTypes, setShiftTypes] = useState(saved?.shiftTypes ?? DEFAULT_SHIFT_TYPES);
  const [shifts,     setShifts]     = useState(saved?.shifts     ?? { 'store-0': {} });
  const [activeStoreId, setActiveStoreId] = useState(saved?.activeStoreId ?? 'store-0');
  const [panel,    setPanel]    = useState('shift');
  const [editCell, setEditCell] = useState(null);
  const [newStaffName, setNewStaffName] = useState('');
  const [newStoreName, setNewStoreName] = useState('');

  // ── Persist ──
  const persist = useCallback((patch) => {
    const next = { year, month, stores, shiftTypes, shifts, activeStoreId, ...patch };
    saveState(next);
  }, [year, month, stores, shiftTypes, shifts, activeStoreId]);

  const days = getDays(year, month);
  const activeStore = stores.find(s => s.id === activeStoreId) || stores[0];
  const storeShifts = shifts[activeStore?.id] || {};

  // ── Month nav ──
  const changeMonth = (d) => {
    let m = month + d, y = year;
    if (m > 11) { m = 0; y++; } if (m < 0) { m = 11; y--; }
    setMonth(m); setYear(y);
    persist({ month: m, year: y });
  };

  // ── Set cell ──
  const setCell = (staffId, day, code) => {
    const ss  = { ...(shifts[activeStore.id] || {}) };
    const arr = [...(ss[staffId] || Array(days).fill(''))];
    arr[day - 1] = code;
    ss[staffId]  = arr;
    const nextShifts = { ...shifts, [activeStore.id]: ss };
    setShifts(nextShifts);
    setEditCell(null);
    persist({ shifts: nextShifts });
  };

  // ── Staff ──
  const addStaff = () => {
    const name = newStaffName.trim();
    if (!name || !activeStore || activeStore.staff.length >= 7) return;
    if (activeStore.staff.find(p => p.name === name)) return;
    const person = { id: 'p-' + Date.now(), name };
    const nextStores = stores.map(s => s.id === activeStore.id ? {...s, staff:[...s.staff, person]} : s);
    const ss = { ...(shifts[activeStore.id] || {}) };
    ss[person.id] = Array(days).fill('');
    const nextShifts = { ...shifts, [activeStore.id]: ss };
    setStores(nextStores); setShifts(nextShifts); setNewStaffName('');
    persist({ stores: nextStores, shifts: nextShifts });
  };
  const removeStaff = (storeId, staffId) => {
    const nextStores = stores.map(s => s.id === storeId ? {...s, staff: s.staff.filter(x => x.id !== staffId)} : s);
    const ss = { ...(shifts[storeId] || {}) }; delete ss[staffId];
    const nextShifts = { ...shifts, [storeId]: ss };
    setStores(nextStores); setShifts(nextShifts);
    persist({ stores: nextStores, shifts: nextShifts });
  };

  // ── Stores ──
  const addStore = () => {
    const name = newStoreName.trim();
    if (!name || stores.length >= 8 || stores.find(s => s.name === name)) return;
    const store = { id: 'store-' + Date.now(), name, staff: [] };
    const nextStores = [...stores, store];
    const nextShifts = { ...shifts, [store.id]: {} };
    setStores(nextStores); setShifts(nextShifts); setActiveStoreId(store.id); setNewStoreName('');
    persist({ stores: nextStores, shifts: nextShifts, activeStoreId: store.id });
  };
  const removeStore = (id) => {
    if (stores.length <= 1) return;
    const nextStores = stores.filter(s => s.id !== id);
    const nextId = activeStoreId === id ? nextStores[0].id : activeStoreId;
    const nextShifts = { ...shifts }; delete nextShifts[id];
    setStores(nextStores); setActiveStoreId(nextId); setShifts(nextShifts);
    persist({ stores: nextStores, activeStoreId: nextId, shifts: nextShifts });
  };
  const renameStore = (id, name) => {
    const nextStores = stores.map(s => s.id === id ? {...s, name} : s);
    setStores(nextStores); persist({ stores: nextStores });
  };

  // ── ShiftTypes ──
  const updateShiftType = (idx, patch) => {
    const next = shiftTypes.map((t,i) => i===idx ? {...t,...patch} : t);
    setShiftTypes(next); persist({ shiftTypes: next });
  };
  const addShiftType = () => {
    const preset = COLOR_PRESETS[shiftTypes.length % COLOR_PRESETS.length];
    const next = [...shiftTypes, { key:'S'+(shiftTypes.length+1), label:'新'+(shiftTypes.length+1), desc:'新種別', ...preset }];
    setShiftTypes(next); persist({ shiftTypes: next });
  };
  const removeShiftType = (idx) => {
    const next = shiftTypes.filter((_,i) => i!==idx);
    setShiftTypes(next); persist({ shiftTypes: next });
  };

  // ── getType ──
  const getType = (code) => shiftTypes.find(t => t.key === code) || EMPTY_SHIFT;

  // ── Stats ──
  const staffStats = useMemo(() => {
    if (!activeStore) return [];
    const restKeys = ['OFF','有休','特休','欠勤','公休','閉',''];
    return activeStore.staff.map(person => {
      const arr = storeShifts[person.id] || [];
      return { ...person,
        work:   arr.filter(x => x && !restKeys.includes(x)).length,
        off:    arr.filter(x => ['OFF','有休','特休','公休'].includes(x)).length,
        absent: arr.filter(x => x === '欠勤').length,
      };
    });
  }, [storeShifts, activeStore, shiftTypes]);

  const dayWorkCount = useMemo(() => {
    if (!activeStore) return [];
    const restKeys = ['OFF','有休','特休','公休','閉','欠勤',''];
    return Array.from({length: days}, (_, i) =>
      activeStore.staff.filter(p => { const c=(storeShifts[p.id]||[])[i]; return c && !restKeys.includes(c); }).length
    );
  }, [storeShifts, activeStore, days]);

  if (!activeStore) return null;
  const allOptions = [...shiftTypes, EMPTY_SHIFT];

  // ── Styles (inlined objects) ──
  const s = {
    navBtn:  { background:'none', border:'none', color:'#94a3b8', fontSize:'20px', cursor:'pointer', padding:'0 6px', lineHeight:1 },
    hBtn:    { padding:'9px 14px', borderRadius:'9px', border:'none', color:'#fff', fontSize:'12px', fontWeight:'700', cursor:'pointer', whiteSpace:'nowrap' },
    th:      { padding:'6px 3px', borderBottom:'2px solid #e2e8f0', borderRight:'1px solid #f1f5f9', color:'#94a3b8', fontWeight:'600', fontSize:'11px', textAlign:'center', position:'sticky', top:0, zIndex:3, background:'#f8fafc' },
    card:    { background:'#fff', border:'1.5px solid #e2e8f0', borderRadius:'12px', padding:'18px', boxShadow:'0 2px 8px rgba(0,0,0,0.04)' },
    delBtn:  { background:'#fef2f2', border:'1px solid #fecaca', color:'#ef4444', cursor:'pointer', fontSize:'11px', padding:'4px 9px', borderRadius:'5px', fontWeight:'700' },
    inputSt: { flex:1, background:'#f8fafc', border:'1.5px solid #e2e8f0', borderRadius:'8px', padding:'8px 12px', color:'#1e293b', fontSize:'13px', outline:'none' },
    addBtn:  { padding:'8px 14px', background:'linear-gradient(135deg,#6366f1,#4f46e5)', color:'#fff', border:'none', borderRadius:'8px', cursor:'pointer', fontSize:'12px', fontWeight:'700', whiteSpace:'nowrap' },
    sInput:  { background:'#f8fafc', border:'1.5px solid #e2e8f0', borderRadius:'7px', padding:'6px 10px', color:'#1e293b', fontSize:'12px', outline:'none' },
    mLabel:  { fontSize:'10px', color:'#94a3b8', letterSpacing:'0.5px', display:'block', marginBottom:'3px' },
  };

  return React.createElement('div', { style:{ minHeight:'100vh', background:'#f8fafc', color:'#1e293b', fontFamily:"'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif", paddingBottom:'env(safe-area-inset-bottom)' } },

    // ── Header ──
    React.createElement('div', { style:{ background:'#fff', borderBottom:'2px solid #e2e8f0', padding:'12px 16px', display:'flex', alignItems:'center', gap:'8px', flexWrap:'wrap', boxShadow:'0 2px 12px rgba(0,0,0,0.06)', position:'sticky', top:0, zIndex:10 } },
      React.createElement('div', { style:{ marginRight:'auto' } },
        React.createElement('div', { style:{ fontSize:'9px', letterSpacing:'4px', color:'#94a3b8', marginBottom:'1px' } }, 'SHIFT MANAGEMENT'),
        React.createElement('div', { style:{ fontSize:'18px', fontWeight:'800', background:'linear-gradient(135deg,#6366f1,#0ea5e9)', WebkitBackgroundClip:'text', WebkitTextFillColor:'transparent' } }, 'UMK シフト管理')
      ),
      React.createElement('div', { style:{ display:'flex', alignItems:'center', gap:'5px', background:'#f1f5f9', borderRadius:'10px', padding:'5px 10px', border:'1px solid #e2e8f0' } },
        React.createElement('button', { onClick:()=>changeMonth(-1), style:s.navBtn }, '‹'),
        React.createElement('span', { style:{ fontSize:'13px', fontWeight:'700', minWidth:'80px', textAlign:'center', color:'#1e293b' } }, year+'年'+(month+1)+'月'),
        React.createElement('button', { onClick:()=>changeMonth(1), style:s.navBtn }, '›')
      ),
      React.createElement('button', { onClick:()=>setPanel(panel==='shiftTypes'?'shift':'shiftTypes'), style:{...s.hBtn, background:panel==='shiftTypes'?'#6366f1':'#fff', color:panel==='shiftTypes'?'#fff':'#64748b', border:'1.5px solid #e2e8f0'} }, '🎨'),
      React.createElement('button', { onClick:()=>setPanel(panel==='settings'?'shift':'settings'), style:{...s.hBtn, background:panel==='settings'?'#6366f1':'#fff', color:panel==='settings'?'#fff':'#64748b', border:'1.5px solid #e2e8f0'} }, '⚙')
    ),

    // ── Store tabs ──
    React.createElement('div', { style:{ background:'#fff', borderBottom:'1.5px solid #e2e8f0', padding:'0 16px', display:'flex', gap:'2px', overflowX:'auto' } },
      stores.map(store =>
        React.createElement('button', { key:store.id, onClick:()=>{ setActiveStoreId(store.id); setPanel('shift'); persist({activeStoreId:store.id}); }, style:{ padding:'9px 16px', background:'none', border:'none', borderBottom: activeStoreId===store.id?'3px solid #6366f1':'3px solid transparent', color: activeStoreId===store.id?'#6366f1':'#94a3b8', fontSize:'13px', fontWeight: activeStoreId===store.id?'700':'400', cursor:'pointer', whiteSpace:'nowrap' } }, store.name)
      )
    ),

    // ── Shift Types Panel ──
    panel==='shiftTypes' && React.createElement('div', { style:{ padding:'20px 16px', maxWidth:'780px' } },
      React.createElement('div', { style:{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'16px' } },
        React.createElement('div', null,
          React.createElement('div', { style:{ fontSize:'15px', fontWeight:'800' } }, '🎨 シフト種別の編集'),
          React.createElement('div', { style:{ fontSize:'11px', color:'#94a3b8', marginTop:'2px' } }, 'ラベル・説明・色を自由にカスタマイズ')
        ),
        React.createElement('button', { onClick:addShiftType, style:{...s.hBtn, background:'linear-gradient(135deg,#10b981,#059669)'} }, '＋ 追加')
      ),
      React.createElement('div', { style:{ display:'grid', gap:'10px' } },
        shiftTypes.map((t, idx) =>
          React.createElement('div', { key:idx, style:{ background:'#fff', borderLeft:'4px solid '+t.border, borderRadius:'12px', padding:'12px 14px', display:'flex', alignItems:'center', gap:'12px', boxShadow:'0 2px 8px rgba(0,0,0,0.04)', flexWrap:'wrap', border:'1.5px solid '+t.border+'30', borderLeft:'4px solid '+t.border } },
            React.createElement('div', { style:{ background:t.bg, border:'1.5px solid '+t.border, color:t.text, borderRadius:'7px', padding:'5px 10px', fontSize:'12px', fontWeight:'800', minWidth:'52px', textAlign:'center', flexShrink:0 } }, t.label),
            React.createElement('div', { style:{ display:'flex', gap:'8px', flexWrap:'wrap', flex:1 } },
              React.createElement('div', null, React.createElement('label', { style:s.mLabel }, 'キー'), React.createElement('input', { value:t.key, onChange:e=>updateShiftType(idx,{key:e.target.value}), style:{...s.sInput, width:'66px', fontWeight:'700'}, maxLength:6 })),
              React.createElement('div', null, React.createElement('label', { style:s.mLabel }, 'ラベル'), React.createElement('input', { value:t.label, onChange:e=>updateShiftType(idx,{label:e.target.value}), style:{...s.sInput, width:'78px'}, maxLength:6 })),
              React.createElement('div', null, React.createElement('label', { style:s.mLabel }, '説明'), React.createElement('input', { value:t.desc, onChange:e=>updateShiftType(idx,{desc:e.target.value}), style:{...s.sInput, width:'100px'}, maxLength:10 }))
            ),
            React.createElement('div', null,
              React.createElement('label', { style:s.mLabel }, 'カラー'),
              React.createElement('div', { style:{ display:'flex', gap:'4px', flexWrap:'wrap', maxWidth:'160px' } },
                COLOR_PRESETS.map((p,pi) => React.createElement('button', { key:pi, onClick:()=>updateShiftType(idx,p), style:{ width:'18px', height:'18px', borderRadius:'50%', background:p.bg, border:'2px solid '+p.border, cursor:'pointer', flexShrink:0, outline: t.border===p.border?'2px solid '+p.border:'none', outlineOffset:'1px' } }))
              )
            ),
            React.createElement('div', null,
              React.createElement('label', { style:s.mLabel }, '背景/枠/文字'),
              React.createElement('div', { style:{ display:'flex', gap:'4px' } },
                [['bg','背景'],['border','枠'],['text','文字']].map(([k,lbl]) =>
                  React.createElement('div', { key:k, style:{ display:'flex', flexDirection:'column', alignItems:'center', gap:'2px' } },
                    React.createElement('div', { style:{ position:'relative', width:'24px', height:'24px', borderRadius:'5px', border:'1.5px solid #e2e8f0', overflow:'hidden' } },
                      React.createElement('div', { style:{ position:'absolute', inset:0, background:t[k] } }),
                      React.createElement('input', { type:'color', value:t[k], onChange:e=>updateShiftType(idx,{[k]:e.target.value}), style:{ opacity:0, position:'absolute', inset:0, width:'100%', height:'100%', cursor:'pointer' } })
                    ),
                    React.createElement('span', { style:{ fontSize:'9px', color:'#94a3b8' } }, lbl)
                  )
                )
              )
            ),
            React.createElement('button', { onClick:()=>removeShiftType(idx), style:{...s.delBtn, marginLeft:'auto'} }, '削除')
          )
        )
      ),
      React.createElement('div', { style:{ marginTop:'10px', background:'#fffbeb', border:'1px solid #fde68a', borderRadius:'10px', padding:'10px 14px', fontSize:'11px', color:'#92400e' } }, '⚠ キーを変更すると既存シフトとの紐付けが外れます。')
    ),

    // ── Settings Panel ──
    panel==='settings' && React.createElement('div', { style:{ padding:'20px 16px', maxWidth:'700px' } },
      React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'14px' } },
        // Stores
        React.createElement('div', { style:s.card },
          React.createElement('div', { style:{ fontSize:'13px', fontWeight:'700', color:'#6366f1', marginBottom:'12px' } }, '🏪 店舗一覧 ', React.createElement('span', { style:{ background:'#eff6ff', color:'#6366f1', fontSize:'10px', padding:'2px 7px', borderRadius:'10px', fontWeight:'700' } }, stores.length+'/8')),
          stores.map(store =>
            React.createElement('div', { key:store.id, style:{ display:'flex', alignItems:'center', gap:'6px', padding:'7px 0', borderBottom:'1px solid #f1f5f9' } },
              React.createElement('input', { defaultValue:store.name, onBlur:e=>renameStore(store.id, e.target.value.trim()||store.name), style:{ flex:1, background:'transparent', border:'1px solid transparent', borderRadius:'6px', padding:'3px 6px', color:'#1e293b', fontSize:'13px', outline:'none' } }),
              React.createElement('button', { onClick:()=>removeStore(store.id), style:s.delBtn }, '✕')
            )
          ),
          stores.length < 8 && React.createElement('div', { style:{ display:'flex', gap:'6px', marginTop:'10px' } },
            React.createElement('input', { value:newStoreName, onChange:e=>setNewStoreName(e.target.value), onKeyDown:e=>e.key==='Enter'&&addStore(), placeholder:'店舗名', style:s.inputSt }),
            React.createElement('button', { onClick:addStore, style:s.addBtn }, '追加')
          )
        ),
        // Staff
        React.createElement('div', { style:s.card },
          React.createElement('div', { style:{ fontSize:'13px', fontWeight:'700', color:'#6366f1', marginBottom:'12px' } }, '👤 '+activeStore.name, React.createElement('span', { style:{ background:'#eff6ff', color:'#6366f1', fontSize:'10px', padding:'2px 7px', borderRadius:'10px', fontWeight:'700', marginLeft:'6px' } }, activeStore.staff.length+'/7')),
          activeStore.staff.map(p =>
            React.createElement('div', { key:p.id, style:{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'7px 0', borderBottom:'1px solid #f1f5f9' } },
              React.createElement('span', { style:{ fontSize:'13px', fontWeight:'600' } }, p.name),
              React.createElement('button', { onClick:()=>removeStaff(activeStore.id, p.id), style:s.delBtn }, '✕')
            )
          ),
          activeStore.staff.length < 7 && React.createElement('div', { style:{ display:'flex', gap:'6px', marginTop:'10px' } },
            React.createElement('input', { value:newStaffName, onChange:e=>setNewStaffName(e.target.value), onKeyDown:e=>e.key==='Enter'&&addStaff(), placeholder:'スタッフ名', style:s.inputSt }),
            React.createElement('button', { onClick:addStaff, style:s.addBtn }, '追加')
          ),
          React.createElement('div', { style:{ marginTop:'10px', padding:'8px 10px', background:'#f8fafc', borderRadius:'8px', fontSize:'11px', color:'#94a3b8' } }, '※ 最大7名まで')
        )
      )
    ),

    // ── Shift Grid ──
    panel==='shift' && React.createElement('div', { style:{ padding:'12px 16px' } },
      // Stats row
      React.createElement('div', { style:{ display:'flex', gap:'7px', marginBottom:'12px', flexWrap:'wrap' } },
        staffStats.map(p =>
          React.createElement('div', { key:p.id, style:{ background:'#fff', border:'1.5px solid #e2e8f0', borderRadius:'10px', padding:'7px 12px', boxShadow:'0 1px 4px rgba(0,0,0,0.05)' } },
            React.createElement('div', { style:{ fontSize:'11px', fontWeight:'700', color:'#6366f1', marginBottom:'3px' } }, p.name),
            React.createElement('div', { style:{ display:'flex', gap:'6px', fontSize:'10px' } },
              React.createElement('span', { style:{ color:'#0ea5e9' } }, '勤'+p.work+'日'),
              React.createElement('span', { style:{ color:'#8b5cf6' } }, '休'+p.off+'日'),
              p.absent > 0 && React.createElement('span', { style:{ color:'#ef4444' } }, '欠'+p.absent+'日')
            )
          )
        ),
        activeStore.staff.length === 0 && React.createElement('div', { style:{ color:'#94a3b8', fontSize:'13px', padding:'8px' } }, '⚙ 設定からスタッフを追加してください')
      ),

      // Table
      React.createElement('div', { style:{ overflowX:'auto', borderRadius:'10px', border:'1.5px solid #e2e8f0', boxShadow:'0 4px 16px rgba(0,0,0,0.06)' } },
        React.createElement('table', { style:{ borderCollapse:'collapse', minWidth:'100%', tableLayout:'fixed' } },
          React.createElement('colgroup', null,
            React.createElement('col', { style:{ width:'68px' } }),
            ...Array.from({length:days}, (_,i) => React.createElement('col', { key:i, style:{ width:'38px' } }))
          ),
          React.createElement('thead', null,
            React.createElement('tr', null,
              React.createElement('th', { style:{...s.th, textAlign:'left', paddingLeft:'10px'} },
                React.createElement('span', { style:{ fontSize:'10px', color:'#94a3b8' } }, activeStore.name)
              ),
              ...Array.from({length:days}, (_,i) => {
                const d = i+1;
                const bgC = isSat(year,month,d)?'#fafafa':isSun(year,month,d)?'#fef2f2':'#f8fafc';
                return React.createElement('th', { key:d, style:{...s.th, background:bgC} },
                  React.createElement('div', { style:{ fontSize:'11px', fontWeight:'700', color:'#1e293b' } }, d),
                  React.createElement('div', { style:{ fontSize:'9px', color:dowColor(year,month,d) } }, DOW_JP[getDow(year,month,d)]),
                  React.createElement('div', { style:{ fontSize:'9px', color: dayWorkCount[i]===0?'#e2e8f0':'#94a3b8' } }, dayWorkCount[i]+'人')
                );
              })
            )
          ),
          React.createElement('tbody', null,
            activeStore.staff.map((person, pi) => {
              const arr = storeShifts[person.id] || Array(days).fill('');
              return React.createElement('tr', { key:person.id, style:{ background: pi%2===0?'#fff':'#fafbfc' } },
                React.createElement('td', { style:{ padding:'5px 8px', borderBottom:'1px solid #f1f5f9', borderRight:'2px solid #e2e8f0', fontSize:'12px', fontWeight:'700', color:'#6366f1', whiteSpace:'nowrap', position:'sticky', left:0, background: pi%2===0?'#fff':'#fafbfc', zIndex:1 } }, person.name),
                ...Array.from({length:days}, (_,i) => {
                  const d = i+1;
                  const code = arr[i]||'';
                  const t = getType(code);
                  const isEd = editCell?.staffId===person.id && editCell?.day===d;
                  return React.createElement('td', { key:d, onClick:()=>setEditCell({staffId:person.id, day:d}), style:{ padding:'3px', borderBottom:'1px solid #f1f5f9', borderRight:'1px solid #f1f5f9', textAlign:'center', cursor:'pointer', background: isEd?'#eff6ff':'transparent', outline: isEd?'2px solid #6366f1':'none', outlineOffset:'-2px' } },
                    code
                      ? React.createElement('div', { style:{ background:t.bg, border:'1px solid '+t.border, color:t.text, borderRadius:'4px', padding:'3px 1px', fontSize:'9px', fontWeight:'800', lineHeight:1.2 } }, t.label)
                      : React.createElement('div', { style:{ color:'#e2e8f0', fontSize:'10px' } }, '·')
                  );
                })
              );
            })
          )
        )
      ),

      // Legend
      React.createElement('div', { style:{ display:'flex', gap:'7px', flexWrap:'wrap', marginTop:'10px', alignItems:'center' } },
        React.createElement('span', { style:{ fontSize:'10px', color:'#94a3b8' } }, '凡例：'),
        shiftTypes.map(t =>
          React.createElement('div', { key:t.key, style:{ display:'flex', alignItems:'center', gap:'4px', fontSize:'10px', color:'#64748b' } },
            React.createElement('div', { style:{ background:t.bg, border:'1px solid '+t.border, color:t.text, borderRadius:'4px', padding:'2px 6px', fontSize:'9px', fontWeight:'800' } }, t.label),
            t.desc
          )
        )
      )
    ),

    // ── Edit Modal ──
    editCell && React.createElement('div', { style:{ position:'fixed', inset:0, background:'rgba(15,23,42,0.5)', display:'flex', alignItems:'center', justifyContent:'center', zIndex:200 }, onClick:()=>setEditCell(null) },
      React.createElement('div', { onClick:e=>e.stopPropagation(), style:{ background:'#fff', borderRadius:'20px', padding:'22px 20px', minWidth:'290px', maxWidth:'380px', width:'92vw', boxShadow:'0 30px 80px rgba(0,0,0,0.2)' } },
        React.createElement('div', { style:{ marginBottom:'14px' } },
          React.createElement('div', { style:{ fontSize:'10px', letterSpacing:'2px', color:'#6366f1', marginBottom:'3px' } }, 'シフト変更'),
          React.createElement('div', { style:{ fontSize:'15px', fontWeight:'800', color:'#1e293b' } },
            activeStore.staff.find(p=>p.id===editCell.staffId)?.name,
            React.createElement('span', { style:{ color:'#94a3b8', fontWeight:'400', fontSize:'12px' } }, ' — '+(month+1)+'月'+editCell.day+'日（'+DOW_JP[getDow(year,month,editCell.day)]+'）')
          ),
          (()=>{ const code=(storeShifts[editCell.staffId]||[])[editCell.day-1]||''; const t=getType(code); return code ? React.createElement('div', { style:{ marginTop:'6px', display:'flex', alignItems:'center', gap:'5px', fontSize:'11px', color:'#64748b' } }, '現在：', React.createElement('span', { style:{ background:t.bg, border:'1px solid '+t.border, color:t.text, borderRadius:'4px', padding:'2px 7px', fontSize:'10px', fontWeight:'800' } }, t.label)) : null; })()
        ),
        React.createElement('div', { style:{ display:'grid', gridTemplateColumns:'repeat(3,1fr)', gap:'8px' } },
          allOptions.map(t => {
            const current=(storeShifts[editCell.staffId]||[])[editCell.day-1]||'';
            const isAct=current===t.key;
            return React.createElement('button', { key:t.key||'empty', onClick:()=>setCell(editCell.staffId, editCell.day, t.key), style:{ padding:'12px 4px', background: isAct?t.border:t.bg, border:'1.5px solid '+(isAct?'transparent':t.border), borderRadius:'10px', color: isAct?'#fff':t.text, fontSize:'12px', fontWeight:'800', cursor:'pointer', boxShadow: isAct?'0 4px 12px '+t.border+'60':'none', outline: isAct?'2px solid '+t.border:'none', outlineOffset:'2px' } },
              React.createElement('div', null, t.label||'－'),
              React.createElement('div', { style:{ fontSize:'9px', opacity:0.7, marginTop:'2px' } }, t.desc)
            );
          })
        ),
        React.createElement('button', { onClick:()=>setEditCell(null), style:{ marginTop:'12px', width:'100%', padding:'10px', background:'#f8fafc', color:'#94a3b8', border:'1.5px solid #e2e8f0', borderRadius:'8px', cursor:'pointer', fontSize:'13px', fontWeight:'600' } }, 'キャンセル')
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
